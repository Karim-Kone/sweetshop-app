name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 🛠 Install Dependencies
        run: npm install

      - name: 🚀 Export Android Project
        run: npx expo export:embed --platform android

      - name: 📦 Archive Files
        uses: actions/upload-artifact@v4
        with:
          name: sweetshop-project-ready
          path: .
